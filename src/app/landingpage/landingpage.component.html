<div
  class="bg-gradient-to-r from-blue-500 to-purple-700 flex flex-col justify-content text-white-700 items-center py-6"
>
  <div class="text-center px-6">
    <h1 class="text-4xl font-bold mb-4">Login</h1>
    <p class="text-bold text-lg mb-6">
      Explore, share and organize the places that you love. All in just one
      place
    </p>

    <button
      (click)="navigate()" *ngIf="isLoggedIn()"
      class="bg-white text-blue-400 font-semibold py-3 px-8 rounded-full hover:bg-gray-200 flex space-x-3 items-center"
    >
      Hello {{ profile?.name }}, click here to start!
    </button>
    
    <button
      (click)="loginWithGoogle()" *ngIf="!isLoggedIn()"
      class="bg-white text-blue-400 font-semibold py-3 px-8 mt-2 rounded-full hover:bg-gray-200 flex space-x-3 items-center"
    >
      <img width="50px" class="px-2" src="https://img.icons8.com/?size=100&id=17949&format=png&color=000000"/>
        Login with Google
    </button>
  </div>
</div>
