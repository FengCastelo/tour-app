<div class="p-6 max-w-lg mx-auto bg-white shadow-lg rounded-lg mt-6">
  <h2 class="text-2x1 font-bold text-gray-700 mb-2">Places</h2>
  <hr class="mb-5" />
  <form id="formPlace" [formGroup]="formField" (ngSubmit)="save()">
    <div class="mb-4">
      <label for="name" class="block text-gray-600 font-medium mb-2"
        >Name
      </label>
      <input
        type="text"
        name="name"
        formControlName="name"
        id="name"
        placeholder="ex: Beira Mar Beach, Stardust Restaurant"
        class="w-full p-3 rounded border border-gray-300 shadow-sm focus:ring focus:ring-purple-400"
        required
      />
      <span class="text-red-600 text-sm">Required*</span>
    </div>

    <div class="mb-4">
        <label for="category" class="block text-gray-600 font-medium mb-2"
          >Category
        </label>
    </div>

    <div class="mb-4">
      <label for="location" class="block text-gray-600 font-medium mb-2"
        > Location
      </label>
      <input
        type="text"
        name="location"
        formControlName="location"
        id="location"
        placeholder="ex: London, Rio de Janeiro, Orlando"
        class="w-full p-3 rounded border border-gray-300 shadow-sm focus:ring focus:ring-purple-400"
        required
      />
      <span class="text-red-600 text-sm">Required*</span>
    </div>

    <div class="mb-4">
      <label for="urlPhoto" class="block text-gray-600 font-medium mb-2"
        > Place photo URL
      </label>
      <input
        type="text"
        name="urlPhoto"
        formControlName="urlPhoto"
        id="urlPhoto"
        placeholder="ex: http://example.com/photo.jpg"
        class="w-full p-3 rounded border border-gray-300 shadow-sm focus:ring focus:ring-purple-400"
        required
      />
      <span class="text-red-600 text-sm">Required*</span>
    </div>

     <div class="mb-4">
        <label for="category" class="block text-gray-600 font-medium mb-2"
          > Rating
        </label>
    </div>

  </form>

  <button
    type="submit"
    class="w-full bg-blue-800 text-gray-200 font-bold p-3 rounded shadow hover:bg-purple-700"
  >
    Save
  </button>
  
</div>
