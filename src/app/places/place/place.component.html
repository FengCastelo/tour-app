<div class="p-6 max-w-lg mx-auto bg-white shadow-lg rounded-lg mt-6">
  <h2 class="text-2x1 font-bold text-gray-700 mb-2">Places</h2>
  <hr class="mb-5" />
  <form id="formPlace" [formGroup]="formField" (ngSubmit)="save()">
    <div class="mb-4">
      <label for="name" class="block text-gray-600 font-medium mb-2"
        >Name
      </label>
      <input
        type="text"
        name="name"
        formControlName="name"
        maxlength="31"
        id="name"
        placeholder="ex: Beira Mar Beach, Stardust Restaurant"
        class="w-full p-3 rounded border border-gray-300 shadow-sm focus:ring focus:ring-purple-400"
        required
      />
      <span class="text-red-600 text-sm" *ngIf="isFieldInvalid('name')">Required*</span>
      <small class="text-red-600" *ngIf="formField.get('name')?.hasError('maxlength')"> Max. 30 characters* </small>
    </div>

    <div class="mb-4">
      <label for="category" class="block text-gray-600 font-medium mb-2"
        >Category
      </label>
      <select
        name="category"
        id="category"
        formControlName="category"
        class="w-full p-3 border border-gray-400 rounded shadow-sm focus:outline-none focus:ring focus:ring-purple-300"
      >
        <option [value]="">Select a Category</option>
        <option *ngFor="let cat of categories" [value]="cat.id">
          {{ cat.name }}
        </option>
      </select>
      <span class="text-red-600 text-sm" *ngIf="isFieldInvalid('category')"> Please, specify a category* </span>
    </div>

    <div class="mb-4">
      <label for="location" class="block text-gray-600 font-medium mb-2">
        Location
      </label>
      <input
        type="text"
        name="location"
        formControlName="location"
        id="location"
        placeholder="ex: London, Rio de Janeiro, Orlando"
        class="w-full p-3 rounded border border-gray-300 shadow-sm focus:ring focus:ring-purple-400"
        required
      />
      <span class="text-red-600 text-sm" *ngIf="isFieldInvalid('location')"> Required*</span>
    </div>

    <div class="mb-4">
      <label for="urlPhoto" class="block text-gray-600 font-medium mb-2">
        Place photo URL
      </label>
      <input
        type="text"
        name="urlPhoto"
        formControlName="urlPhoto"
        id="urlPhoto"
        placeholder="ex: http://example.com/photo.jpg"
        class="w-full p-3 rounded border border-gray-300 shadow-sm focus:ring focus:ring-purple-400"
        required
      />
      <span class="text-red-600 text-sm" *ngIf="isFieldInvalid('urlPhoto')">URL required*</span>
    </div>

    <div class="mb-4">
      <label for="rating" class="block text-gray-600 font-medium mb-2">
        Rating
      </label>
      <select
        name="rating"
        id="rating"
        formControlName="rating"
        class="w-full p-3 border border-gray-400 rounded shadow-sm focus:outline-none focus:ring focus:ring-purple-300"
      >
        <option [value]=""></option>
        <option [value]="1">1 - So Bad</option>
        <option [value]="2">2 - Bad</option>
        <option [value]="3">3 - Average</option>
        <option [value]="4">4 - Very Good</option>
        <option [value]="5">5 - Excellent</option>
      </select>
      <span class="text-red-600 text-sm" *ngIf="isFieldInvalid('rating')"> Please, provide a review* </span>
    </div>

    <button
      type="submit"
      class="w-full bg-blue-800 text-gray-200 font-bold p-3 rounded shadow hover:bg-purple-700"
    >
      Save Place
    </button>
  </form>
</div>
