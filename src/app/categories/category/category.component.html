<div class="p-6 max-w-lg mx-auto bg-white shadow-lg rounded-lg mt-6">
  <h2 class="text-2x1 font-semibold text-gray-700 mb-2">New Category</h2>
  <hr class="mb-5"/>
  <form id="formCategory" [formGroup]="formField" (ngSubmit)="save()">
    <div class="mb-4">
      <label class="block text-gray-600 font-medium mb-2">Category Name </label>
      <select>
        type="text"
        name="name"
        formControlName="name"
        id="name"
        placeholder="ex: Restaurants, Hotels, Beaches, Malls"
        class="w-full p-3 rounded border border-gray-300 shadow-sm focus:ring focus:ring-purple-400"
        required
      </select>
      <span class="text-red-600 text-sm" *ngIf="isFieldInvalid('name')">Required*</span>
    </div>

    <div class="mb-4">
      <label class="block text-gray-600 font-medium mb-2">Description: </label>
      <textarea
        name="description"
        rows="3"
        id="description"
        formControlName="description"
        placeholder="Place Description"
        class="w-full p-3 rounded border border-gray-300 shadow-sm focus:outline-none focus:ring-purple-400"
        required
      >
      </textarea>
      <span class="text-red-600 text-sm" *ngIf="isFieldInvalid('description')">Required*</span>
    </div>

    <button
      type="submit"
      class="w-full bg-purple-600 text-gray-200 font-bold p-3 rounded shadow hover:bg-purple-900"
    >
      Save
    </button>
  </form>
</div>
